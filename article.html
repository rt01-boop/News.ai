<!DOCTYPE html><html>
<head><title>PulseGurgaon Article</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.header{
background:#1e63c6;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
margin-top:20px;
border-radius:8px;
}

.hero img{
width:100%;
border-radius:6px;
margin-bottom:20px;
}

.title{
font-size:26px;
font-weight:bold;
margin-bottom:10px;
}

.meta{
color:gray;
margin-bottom:20px;
}

.summary{
background:#eef4ff;
padding:15px;
border-radius:6px;
margin-bottom:20px;
}

.article{
line-height:1.7;
font-size:16px;
margin-bottom:25px;
}

.vocab{
background:#f7f7f7;
padding:15px;
border-radius:6px;
}

.vocab h3{
margin-top:0;
}

.footer{
text-align:center;
margin-top:40px;
color:gray;
}

</style></head><body><div class="header">
PulseGurgaon
</div><div class="container"><div class="hero">
<img id="image">
</div><div class="title" id="title"></div><div class="meta" id="meta"></div><div class="summary" id="summary"></div><div class="article" id="article"></div><div class="vocab"><h3>Vocabulary</h3><ul id="vocabList"></ul></div></div><div class="footer">
PulseGurgaon © 2026
</div><script>

const article = JSON.parse(localStorage.getItem("selectedArticle"))

if(article){

document.getElementById("title").innerText = article.title

document.getElementById("meta").innerText =
article.source + " • " + new Date(article.time*1000).toLocaleString()

document.getElementById("summary").innerText = article.summary

document.getElementById("article").innerText = article.article

document.getElementById("image").src =
"https://image.pollinations.ai/prompt/" + article.title

const list = document.getElementById("vocabList")

if(article.vocabulary){

article.vocabulary.forEach(word=>{

const li=document.createElement("li")

li.innerText = word.word + " – " + word.meaning

list.appendChild(li)

})

}

}

</script></body>
</html>
