<!DOCTYPE html>
<html>
<head>

<title>PulseGurgaon News</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

h1{
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
margin-bottom:20px;
border-radius:10px;
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

a{
color:#38bdf8;
text-decoration:none;
}

</style>

</head>

<body>

<h1>PulseGurgaon</h1>

<div id="news"></div>

<script>

async function loadNews(){

let res = await fetch("https://pulsegurgaon-backend.onrender.com/news")

let data = await res.json()

let html=""

data.forEach(article => {

html += `
<div class="card">
<h3>${article.title}</h3>
<a href="${article.link}" target="_blank">Read full article</a>
</div>
`

})

document.getElementById("news").innerHTML = html

}

loadNews()

</script>

</body>
</html>
