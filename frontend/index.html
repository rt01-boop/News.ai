<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title><style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f6f9;
}

header{
background:#0b57d0;
color:white;
padding:18px;
font-size:26px;
font-weight:bold;
}

nav{
background:white;
padding:12px;
border-bottom:1px solid #ddd;
}

nav a{
margin-right:20px;
text-decoration:none;
color:#333;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
padding:20px;
}

.timeline{
flex:2;
background:white;
padding:20px;
margin-right:20px;
border-radius:6px;
min-height:300px;
}

.article{
border-bottom:1px solid #eee;
padding:15px 0;
}

.article h3{
margin:0 0 6px 0;
}

.article a{
color:#0b57d0;
text-decoration:none;
}

.sidebar{
flex:1;
background:white;
padding:20px;
border-radius:6px;
}

.notice{
background:#fff3cd;
padding:10px;
border-radius:6px;
margin-bottom:15px;
display:none;
}

footer{
margin-top:40px;
background:#111;
color:white;
padding:20px;
text-align:center;
}

</style></head><body><header>
PulseGurgaon
</header><nav>
<a href="#">Gurgaon</a>
<a href="#">Finance</a>
<a href="#">World</a>
<a href="#">Blogs</a>
</nav><div class="container"><div class="timeline"><div id="notice" class="notice">
New articles available. Refresh page.
</div><h2>Latest News</h2><div id="newsContainer">
Loading news...
</div></div><div class="sidebar"><h3>Blogs</h3><p>How to Invest ₹1000 in Stock Market</p>
<p>Hidden Places in Gurgaon Locals Love</p></div></div><footer>
PulseGurgaon © 2026
</footer><script>

let currentCount = 0;

async function loadNews(){

try{

const response = await fetch("https://pulsegurgaon-backend.onrender.com/news");

const data = await response.json();

const container = document.getElementById("newsContainer");

if(currentCount === 0){

container.innerHTML="";

data.forEach(article=>{

const div=document.createElement("div");

div.className="article";

div.innerHTML=`
<h3>${article.title}</h3>
<p>${article.source}</p>
<a href="${article.link}" target="_blank">Read source</a>
`;

container.appendChild(div);

});

currentCount = data.length;

}

else if(data.length > currentCount){

document.getElementById("notice").style.display="block";

}

}catch(error){

document.getElementById("newsContainer").innerText="Backend waking up... refresh in 30 seconds.";

}

}

loadNews();

setInterval(loadNews,120000);

</script></body>
</html>
