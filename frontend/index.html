<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PulseGurgaon</title><style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#0b57d0;
color:white;
padding:18px;
font-size:26px;
font-weight:bold;
}

nav{
background:white;
padding:12px;
border-bottom:1px solid #ddd;
}

nav a{
margin-right:20px;
text-decoration:none;
color:#333;
font-weight:bold;
}

.searchbar{
background:white;
padding:25px;
text-align:center;
border-bottom:1px solid #ddd;
}

.searchbar input{
width:90%;
max-width:650px;
padding:14px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

.container{
display:flex;
flex-wrap:wrap;
padding:20px;
}

.timeline{
flex:2;
background:white;
padding:20px;
margin-right:20px;
border-radius:6px;
min-height:300px;
}

.article{
border-bottom:1px solid #eee;
padding:15px 0;
}

.article h3{
margin:0 0 6px 0;
font-size:18px;
}

.article a{
color:#0b57d0;
text-decoration:none;
}

.sidebar{
flex:1;
background:white;
padding:20px;
border-radius:6px;
}

.blog{
margin-bottom:20px;
}

footer{
margin-top:40px;
background:#111;
color:white;
padding:20px;
text-align:center;
}

.status{
color:#888;
font-size:14px;
margin-bottom:10px;
}

</style></head><body><header>
PulseGurgaon
</header><nav>
<a href="#">Home</a>
<a href="#">India</a>
<a href="#">Gurgaon</a>
<a href="#">World</a>
<a href="#">Finance</a>
<a href="#">Blogs</a>
</nav><div class="searchbar">
<input id="searchBox" placeholder="Search news, places, dates...">
</div><div class="container"><div class="timeline"><h2>Latest News</h2><div id="status" class="status">
Loading news...
</div><div id="newsContainer"></div></div><div class="sidebar"><h3>Blogs</h3><div class="blog">
How to Invest ₹1000 in Stock Market
</div><div class="blog">
Hidden Places in Gurgaon Locals Love
</div></div></div><footer>
PulseGurgaon © 2026
</footer><script>

async function loadNews(){

const container = document.getElementById("newsContainer")
const status = document.getElementById("status")

try{

const response = await fetch("https://pulsegurgaon-backend.onrender.com/news")

const data = await response.json()

container.innerHTML=""

status.innerText=""

data.slice(0,25).forEach(article=>{

const div=document.createElement("div")

div.className="article"

div.innerHTML=`
<h3>${article.title}</h3>
<p>${article.source}</p>
<a href="${article.link}" target="_blank">Read source</a>
`

container.appendChild(div)

})

}

catch(err){

status.innerText="Backend waking up... retrying in 5 seconds"

setTimeout(loadNews,5000)

}

}

loadNews()

setInterval(loadNews,120000)

</script></body>
</html>
