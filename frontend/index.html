<!DOCTYPE html>
<html>
<head>
<title>PulseGurgaon</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px
}

.card{
background:#1e293b;
padding:15px;
margin-bottom:15px;
border-radius:10px
}

a{
color:#38bdf8
}

</style>

</head>

<body>

<h1>PulseGurgaon News</h1>

<div id="news"></div>

<script>

async function loadNews(){

let response = await fetch("http://localhost:8000/news")

let data = await response.json()

let html=""

data.forEach(article => {

html += `
<div class="card">
<h3>${article.title}</h3>
<a href="${article.link}" target="_blank">Read source</a>
</div>
`

})

document.getElementById("news").innerHTML = html

}

loadNews()

</script>

</body>
</html>
