<!DOCTYPE html>
<html>
<head>

<title>PulseGurgaon</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.header{
background:#1e63c6;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.nav{
background:#e6e6e6;
padding:10px;
}

.nav a{
margin-right:20px;
text-decoration:none;
color:black;
}

.search{
padding:20px;
text-align:center;
}

.search input{
width:80%;
padding:12px;
font-size:16px;
border-radius:5px;
border:1px solid #ccc;
}

.container{
display:flex;
gap:20px;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:6px;
flex:1;
}

.article{
margin-bottom:20px;
padding-bottom:20px;
border-bottom:1px solid #ddd;
}

.article img{
width:100%;
border-radius:5px;
margin-bottom:10px;
}

.source{
color:gray;
font-size:14px;
margin-bottom:8px;
}

.summary{
margin-top:8px;
font-size:14px;
}

.footer{
background:black;
color:white;
text-align:center;
padding:12px;
}

</style>

</head>

<body>

<div class="header">PulseGurgaon</div>

<div class="nav">
<a>Home</a>
<a>India</a>
<a>Gurgaon</a>
<a>World</a>
<a>Finance</a>
<a>Blogs</a>
</div>

<div class="search">
<input placeholder="Search news, places, dates...">
</div>

<div class="container">

<div class="box">

<h2>Latest News</h2>

<div id="newsContainer">
Loading news...
</div>

</div>

<div class="box">

<h2>Blogs</h2>

<p>How to Invest ₹1000 in Stock Market</p>
<p>Hidden Places in Gurgaon Locals Love</p>

</div>

</div>

<div class="footer">PulseGurgaon © 2026</div>

<script>

async function loadNews(){

const container=document.getElementById("newsContainer");

try{

const response=await fetch("https://pulsegurgaon-backend.onrender.com/news");

const data=await response.json();

container.innerHTML="";

data.forEach(article=>{

const div=document.createElement("div");

div.className="article";

div.innerHTML=`

<img src="https://source.unsplash.com/800x400/?finance,india,city">

<h3>${article.title}</h3>

<div class="source">${article.source}</div>

<div class="summary">

<b>English summary:</b><br>
This article discusses ${article.title}. More developments are expected soon.

<br><br>

<b>हिंदी सार:</b><br>
यह खबर ${article.title} से संबंधित है और इससे जुड़ी नई जानकारी सामने आ सकती है।

</div>

<br>

<a href="${article.link}" target="_blank">Read full source</a>

`;

container.appendChild(div);

});

}

catch(err){

container.innerText="Backend waking up... retrying in 5 seconds";

setTimeout(loadNews,5000);

}

}

loadNews();

</script>

</body>
</html>
