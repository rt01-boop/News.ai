<!DOCTYPE html><html>
<head><title>PulseGurgaon</title><style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.header{
background:#1e63c6;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.nav{
background:#e6e6e6;
padding:10px;
}

.nav a{
margin-right:20px;
text-decoration:none;
color:black;
}

.search{
padding:20px;
text-align:center;
}

.search input{
width:70%;
padding:12px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

.layout{
display:grid;
grid-template-columns:160px 1fr 260px;
gap:20px;
padding:20px;
}

.ad{
background:white;
padding:10px;
border-radius:6px;
text-align:center;
}

.section{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:25px;
}

.section h2{
margin-top:0;
}

.row{
display:flex;
gap:15px;
}

.card{
width:260px;
background:#fafafa;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
padding:10px;
}

.card img{
width:100%;
border-radius:6px;
margin-bottom:8px;
}

.card h4{
font-size:15px;
margin:5px 0;
}

.card button{
background:#1e63c6;
color:white;
border:none;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
}

.arrow{
background:#1e63c6;
color:white;
border:none;
font-size:18px;
padding:10px;
border-radius:6px;
cursor:pointer;
margin:0 5px;
}

.slider{
display:flex;
align-items:center;
}

.blogs{
background:white;
border-radius:8px;
padding:15px;
margin-top:20px;
}

.footer{
background:black;
color:white;
text-align:center;
padding:12px;
}

</style></head><body><div class="header">PulseGurgaon</div><div class="nav">
<a>Home</a>
<a>India</a>
<a>Gurgaon</a>
<a>World</a>
<a>Finance</a>
<a>Blogs</a>
</div><div class="search">
<input placeholder="Search news, places, dates...">
</div><div class="layout"><div class="ad">ADVERTISEMENT</div><div><div class="section"><h2>Gurgaon</h2><div class="slider">
<button class="arrow" onclick="slide('gurgaon',-1)">❮</button><div class="row" id="gurgaon"></div><button class="arrow" onclick="slide('gurgaon',1)">❯</button>

</div></div><div class="section"><h2>Finance</h2><div class="slider">
<button class="arrow" onclick="slide('finance',-1)">❮</button><div class="row" id="finance"></div><button class="arrow" onclick="slide('finance',1)">❯</button>

</div></div><div class="section"><h2>World</h2><div class="slider">
<button class="arrow" onclick="slide('world',-1)">❮</button><div class="row" id="world"></div><button class="arrow" onclick="slide('world',1)">❯</button>

</div></div></div><div><div class="ad">ADVERTISEMENT</div><div class="blogs">
<h3>Blogs</h3>
<p>How to Invest ₹1000</p>
<p>Hidden Places in Gurgaon</p>
<p>Startup Ideas in India</p>
</div></div></div><div class="footer">PulseGurgaon © 2026</div><script>

let news=[]
let page={
gurgaon:0,
finance:0,
world:0
}

const perPage=3

function createCard(article){

const div=document.createElement("div")
div.className="card"

div.innerHTML=`
<img src="https://image.pollinations.ai/prompt/news ${article.title}">
<h4>${article.title}</h4>
<button onclick="openArticle('${encodeURIComponent(article.title)}')">Read Article</button>
`

return div

}

function openArticle(title){
localStorage.setItem("articleTitle",title)
window.location="article.html"
}

function render(section){

let container=document.getElementById(section)
container.innerHTML=""

let filtered=news.filter(a=>{

let t=a.title.toLowerCase()

if(section==="gurgaon") return t.includes("gurgaon")||t.includes("gurugram")
if(section==="finance") return t.includes("bank")||t.includes("finance")||t.includes("market")

return true

})

let start=page[section]*perPage
let visible=filtered.slice(start,start+perPage)

visible.forEach(a=>{
container.appendChild(createCard(a))
})

}

function slide(section,dir){

page[section]+=dir

if(page[section]<0) page[section]=0

render(section)

}

async function loadNews(){

let res=await fetch("https://pulsegurgaon-backend.onrender.com/news")
news=await res.json()

render("gurgaon")
render("finance")
render("world")

}

loadNews()

</script></body>
</html>
