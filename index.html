<!DOCTYPE html>
<html>
<head>

<title>PulseGurgaon</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.header{
background:#1e63c6;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.nav{
background:#e6e6e6;
padding:10px;
}

.nav a{
margin-right:20px;
text-decoration:none;
color:black;
}

.search{
padding:20px;
text-align:center;
}

.search input{
width:80%;
padding:12px;
font-size:16px;
border-radius:5px;
border:1px solid #ccc;
}

.container{
display:flex;
gap:20px;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:6px;
flex:1;
}

.article{
margin-bottom:25px;
padding-bottom:20px;
border-bottom:1px solid #ddd;
}

.article img{
width:100%;
border-radius:6px;
margin-bottom:10px;
}

.source{
color:gray;
font-size:14px;
margin-bottom:6px;
}

.date{
color:#777;
font-size:13px;
margin-bottom:8px;
}

.summary{
font-size:14px;
margin-top:10px;
}

.footer{
background:black;
color:white;
text-align:center;
padding:12px;
}

</style>

</head>

<body>

<div class="header">PulseGurgaon</div>

<div class="nav">
<a>Home</a>
<a>India</a>
<a>Gurgaon</a>
<a>World</a>
<a>Finance</a>
<a>Blogs</a>
</div>

<div class="search">
<input placeholder="Search news, places, dates...">
</div>

<div class="container">

<div class="box">

<h2>Latest News</h2>

<div id="newsContainer">
Loading news...
</div>

</div>

<div class="box">

<h2>Blogs</h2>

<p>How to Invest ₹1000 in Stock Market</p>
<p>Hidden Places in Gurgaon Locals Love</p>

</div>

</div>

<div class="footer">PulseGurgaon © 2026</div>

<script>

function renderArticles(list){

const container=document.getElementById("newsContainer");
container.innerHTML="";

list.forEach(article=>{

const div=document.createElement("div");
div.className="article";

const date=new Date().toLocaleString();

div.innerHTML=`

<img src="https://source.unsplash.com/800x400/?news,india">

<h3>${article.title}</h3>

<div class="source">${article.source}</div>

<div class="date">${date}</div>

<div class="summary">

<b>English summary:</b><br>
This article discusses ${article.title}. More developments are expected soon.

<br><br>

<b>हिंदी सार:</b><br>
यह खबर ${article.title} से संबंधित है और इससे जुड़ी नई जानकारी सामने आ सकती है।

</div>

<br>

<a href="${article.link}" target="_blank">Read full source</a>

`;

container.appendChild(div);

});

}

async function loadNews(){

try{

const response=await fetch("https://pulsegurgaon-backend.onrender.com/news");
const data=await response.json();

let stored=JSON.parse(localStorage.getItem("newsHistory")) || [];

const merged=[...data,...stored];

const unique=[];
const titles=new Set();

merged.forEach(a=>{
if(!titles.has(a.title)){
titles.add(a.title);
unique.push(a);
}
});

localStorage.setItem("newsHistory",JSON.stringify(unique));

renderArticles(unique);

}

catch{

const stored=JSON.parse(localStorage.getItem("newsHistory"));

if(stored){
renderArticles(stored);
}else{
document.getElementById("newsContainer").innerText="Backend waking up...";
}

}

}

loadNews();

</script>

</body>
</html>
