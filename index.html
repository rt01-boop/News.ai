<!DOCTYPE html><html><head><title>PulseGurgaon</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.header{
background:#1e63c6;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.nav{
background:#e6e6e6;
padding:10px;
}

.nav a{
margin-right:20px;
text-decoration:none;
color:black;
}

.search{
padding:20px;
text-align:center;
}

.search input{
width:80%;
padding:12px;
font-size:16px;
}

.container{
display:flex;
gap:20px;
padding:20px;
}

.main{
flex:3;
}

.sidebar{
flex:1;
}

.section{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:6px;
}

.row{
display:flex;
overflow:hidden;
gap:15px;
}

.card{
min-width:220px;
background:#fafafa;
padding:15px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:4px;
margin-bottom:10px;
}

.card button{
background:#1e63c6;
color:white;
border:none;
padding:8px 12px;
border-radius:4px;
cursor:pointer;
}

.arrow{
background:#1e63c6;
color:white;
border:none;
padding:10px;
border-radius:4px;
cursor:pointer;
}

.footer{
background:black;
color:white;
text-align:center;
padding:12px;
}

</style></head><body><div class="header">PulseGurgaon</div><div class="nav">
<a>Home</a>
<a>India</a>
<a>Gurgaon</a>
<a>World</a>
<a>Finance</a>
<a>Blogs</a>
</div><div class="search">
<input placeholder="Search news, places, dates...">
</div><div class="container"><div class="main"><div class="section"><h2>Gurgaon</h2><button class="arrow" onclick="scrollLeft('gurgaon')"><</button>

<button class="arrow" onclick="scrollRight('gurgaon')">></button>

<div class="row" id="gurgaon"></div></div><div class="section"><h2>Finance</h2><button class="arrow" onclick="scrollLeft('finance')"><</button>

<button class="arrow" onclick="scrollRight('finance')">></button>

<div class="row" id="finance"></div></div><div class="section"><h2>World</h2><button class="arrow" onclick="scrollLeft('world')"><</button>

<button class="arrow" onclick="scrollRight('world')">></button>

<div class="row" id="world"></div></div></div><div class="sidebar"><div class="section">
ADVERTISEMENT
</div><div class="section"><h3>Blogs</h3><p>How to Invest ₹1000</p>
<p>Hidden Places in Gurgaon</p>
<p>Startup Ideas in India</p></div></div></div><div class="footer">PulseGurgaon © 2026</div><script>

function openArticle(article){

localStorage.setItem("selectedArticle", JSON.stringify(article))

window.location.href="article.html"

}


function scrollLeft(id){

document.getElementById(id).scrollBy({
left:-300,
behavior:'smooth'
})

}

function scrollRight(id){

document.getElementById(id).scrollBy({
left:300,
behavior:'smooth'
})

}


async function loadNews(){

const res=await fetch("https://pulsegurgaon-backend.onrender.com/news")

const data=await res.json()

const gurgaon=document.getElementById("gurgaon")

const finance=document.getElementById("finance")

const world=document.getElementById("world")

data.forEach(article=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="https://image.pollinations.ai/prompt/${article.title}">

<h4>${article.title}</h4>

<button onclick='openArticle(${JSON.stringify(article)})'>
Read Article
</button>

`

gurgaon.appendChild(card)

finance.appendChild(card.cloneNode(true))

world.appendChild(card.cloneNode(true))

})

}

loadNews()

</script></body></html>
