<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title><style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f6f9;
}

header{
background:#0b57d0;
color:white;
padding:18px;
font-size:26px;
font-weight:bold;
}

nav{
background:white;
padding:12px;
border-bottom:1px solid #ddd;
}

nav a{
margin-right:20px;
text-decoration:none;
color:#333;
font-weight:bold;
}

.searchbar{
padding:30px;
background:white;
text-align:center;
}

.searchbar input{
width:90%;
max-width:700px;
padding:16px;
font-size:18px;
border:1px solid #ccc;
border-radius:6px;
}

.container{
display:flex;
flex-wrap:wrap;
padding:20px;
}

.timeline{
flex:2;
background:white;
padding:20px;
margin-right:20px;
border-radius:6px;
min-height:300px;
}

.article{
border-bottom:1px solid #eee;
padding:15px 0;
}

.article h3{
margin:0 0 6px 0;
}

.article a{
color:#0b57d0;
text-decoration:none;
}

.sidebar{
flex:1;
background:white;
padding:20px;
border-radius:6px;
}

.blog{
margin-bottom:20px;
}

.blog img{
width:100%;
border-radius:6px;
}

.ad{
margin-top:30px;
padding:20px;
background:#f1f1f1;
text-align:center;
font-weight:bold;
}

footer{
margin-top:40px;
background:#111;
color:white;
padding:20px;
text-align:center;
}

.loading{
color:gray;
margin-top:10px;
}

</style></head><body><header>
PulseGurgaon
</header><nav>
<a href="#">Home</a>
<a href="#">India</a>
<a href="#">Gurgaon</a>
<a href="#">World</a>
<a href="#">Finance</a>
<a href="#">Blogs</a>
</nav><div class="searchbar">
<input type="text" placeholder="Search cities, topics, news...">
</div><div class="container"><div class="timeline"><h2>Latest News</h2><p class="loading" id="loading">Loading latest news...</p><div id="newsContainer"></div></div><div class="sidebar"><h3>Blogs</h3><div class="blog">
<img src="https://picsum.photos/202">
<p>How to Invest ₹1000 in Stock Market</p>
</div><div class="blog">
<img src="https://picsum.photos/203">
<p>Hidden Places in Gurgaon Locals Love</p>
</div><div class="ad">
Advertise Here
</div></div></div><footer>
PulseGurgaon © 2026
</footer><script>

async function loadNews(){

try{

const response = await fetch("https://pulsegurgaon-backend.onrender.com/news");

const news = await response.json();

const container = document.getElementById("newsContainer");

document.getElementById("loading").style.display="none";

news.slice(0,15).forEach(article => {

const div = document.createElement("div");

div.className="article";

div.innerHTML = `
<h3>${article.title}</h3>
<p>${article.source}</p>
<a href="${article.link}" target="_blank">Read full article</a>
`;

container.appendChild(div);

});

}

catch(error){

document.getElementById("loading").innerText="Backend waking up... please refresh in 20 seconds.";

}

}

loadNews();

</script></body>
</html>
