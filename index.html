<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title><style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f2f2f2;
}

header{
background:#2c6fb7;
color:white;
padding:12px;
font-size:20px;
font-weight:bold;
}

nav{
background:#eaeaea;
padding:10px;
}

nav a{
margin-right:15px;
text-decoration:none;
color:#333;
font-weight:bold;
}

.container{
display:flex;
max-width:1100px;
margin:auto;
padding:15px;
gap:20px;
}

.main{
flex:3;
}

.sidebar{
flex:1;
}

.section{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:6px;
}

.news-card{
border-bottom:1px solid #ddd;
padding:10px 0;
}

.news-card h3{
margin:0;
font-size:18px;
}

.news-card p{
margin:5px 0;
color:#555;
}

.arrow-container{
margin-top:10px;
}

.arrow-btn{
background:#2c6fb7;
border:none;
color:white;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
margin-right:5px;
}

.search{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
margin-bottom:20px;
}

.ad{
background:#f8f8f8;
padding:25px;
border-radius:6px;
margin-bottom:20px;
text-align:center;
font-weight:bold;
color:#777;
min-height:120px;
}

.blogs a{
display:block;
margin-bottom:8px;
text-decoration:none;
color:#333;
}

footer{
background:black;
color:white;
text-align:center;
padding:10px;
}

</style></head><body><header>
PulseGurgaon
</header><nav>
<a href="#">Home</a>
<a href="#">India</a>
<a href="#">Gurgaon</a>
<a href="#">World</a>
<a href="#">Finance</a>
<a href="#">Blogs</a>
</nav><div class="container"><div class="main"><input class="search" placeholder="Search news, places, dates..."><div class="section ad">
ADVERTISEMENT
</div><div class="section"><h2>Gurgaon</h2><div id="gurgaon-news"></div><div class="arrow-container">
<button class="arrow-btn">&lt;</button>
<button class="arrow-btn">&gt;</button>
</div></div><div class="section"><h2>Finance</h2><div id="finance-news"></div><div class="arrow-container">
<button class="arrow-btn">&lt;</button>
<button class="arrow-btn">&gt;</button>
</div></div><div class="section"><h2>World</h2><div id="world-news"></div><div class="arrow-container">
<button class="arrow-btn">&lt;</button>
<button class="arrow-btn">&gt;</button>
</div></div></div><div class="sidebar"><div class="ad">
ADVERTISEMENT
</div><div class="section blogs"><h3>Blogs</h3><a href="#">How to Invest ₹1000</a>
<a href="#">Hidden Places in Gurgaon</a>
<a href="#">Startup Ideas in India</a>

</div></div></div><footer>
PulseGurgaon © 2026
</footer><script>

async function loadNews(){

try{

const response = await fetch("https://pulsegurgaon-backend.onrender.com/articles")

const articles = await response.json()

const gurgaon = document.getElementById("gurgaon-news")

gurgaon.innerHTML=""

articles.forEach(article => {

const card = document.createElement("div")

card.className="news-card"

card.innerHTML = `
<h3>${article.title}</h3>
<p>${article.summary}</p>
<a href="#">Read article</a>
`

gurgaon.appendChild(card)

})

}catch(err){

console.log("News load failed",err)

}

}

loadNews()

</script></body>
</html>
