<!DOCTYPE html><html><head>
<title>PulseGurgaon</title><style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.header{
background:#1e63c6;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.nav{
background:#e6e6e6;
padding:10px;
}

.nav a{
margin-right:20px;
text-decoration:none;
color:black;
}

.search{
padding:20px;
text-align:center;
}

.search input{
width:70%;
padding:12px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

.main{
display:grid;
grid-template-columns: 160px 1fr 260px;
gap:20px;
padding:20px;
}

.ad{
background:white;
padding:10px;
text-align:center;
border-radius:6px;
min-height:600px;
}

.section{
background:white;
padding:20px;
border-radius:6px;
margin-bottom:20px;
}

.row{
display:flex;
overflow-x:auto;
gap:15px;
padding-bottom:10px;
}

.card{
min-width:260px;
background:#fafafa;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
padding:10px;
}

.card img{
width:100%;
border-radius:6px;
margin-bottom:8px;
}

.card h4{
margin:5px 0;
font-size:16px;
}

.summary{
font-size:13px;
color:#555;
}

.blogs{
background:white;
padding:15px;
border-radius:6px;
margin-top:20px;
}

.footer{
background:black;
color:white;
text-align:center;
padding:12px;
}

</style></head><body><div class="header">PulseGurgaon</div><div class="nav">
<a>Home</a>
<a>India</a>
<a>Gurgaon</a>
<a>World</a>
<a>Finance</a>
<a>Blogs</a>
</div><div class="search">
<input placeholder="Search news, places, dates...">
</div><div class="main"><div class="ad">
ADVERTISEMENT
</div><div><div class="section">
<h2>Gurgaon</h2>
<div class="row" id="gurgaon"></div>
</div><div class="section">
<h2>Finance</h2>
<div class="row" id="finance"></div>
</div><div class="section">
<h2>World</h2>
<div class="row" id="world"></div>
</div></div><div><div class="ad">
ADVERTISEMENT
</div><div class="blogs">
<h3>Blogs</h3>
<p>How to Invest ₹1000</p>
<p>Hidden Places in Gurgaon</p>
<p>Startup Ideas in India</p>
</div></div></div><div class="footer">PulseGurgaon © 2026</div><script>

function createCard(article){

const div=document.createElement("div")
div.className="card"

div.innerHTML=`

<img src="https://image.pollinations.ai/prompt/news ${article.title}">

<h4>${article.title}</h4>

<div class="summary">
Quick summary about ${article.title}.
</div>

<button onclick='openArticle(${JSON.stringify(article)})'>
Read Article
</button>

`

return div
}

function openArticle(article){

localStorage.setItem("selectedArticle",JSON.stringify(article))

window.location="article.html"

}

async function loadNews(){

try{

const res=await fetch("https://pulsegurgaon-backend.onrender.com/news")
const data=await res.json()

data.forEach(article=>{

let title=article.title.toLowerCase()

let card=createCard(article)

if(title.includes("gurgaon") || title.includes("gurugram"))
document.getElementById("gurgaon").appendChild(card)

else if(title.includes("bank") || title.includes("stock") || title.includes("market") || title.includes("rbi"))
document.getElementById("finance").appendChild(card)

else
document.getElementById("world").appendChild(card)

})

}catch(e){

console.log("backend sleeping")

}

}

loadNews()

</script></body>
</html>
