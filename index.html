<!DOCTYPE html>
<html>
<head>
<title>PulseGurgaon</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.header{
background:#1e63c6;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.nav{
background:#e6e6e6;
padding:10px;
}

.nav a{
margin-right:20px;
text-decoration:none;
color:black;
}

.search{
padding:20px;
text-align:center;
}

.search input{
width:80%;
padding:12px;
font-size:16px;
}

.container{
display:flex;
gap:20px;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:6px;
flex:1;
}

.article{
margin-bottom:15px;
padding-bottom:10px;
border-bottom:1px solid #ddd;
}

.footer{
background:black;
color:white;
text-align:center;
padding:12px;
}

</style>

</head>

<body>

<div class="header">PulseGurgaon</div>

<div class="nav">
<a>Home</a>
<a>India</a>
<a>Gurgaon</a>
<a>World</a>
<a>Finance</a>
<a>Blogs</a>
</div>

<div class="search">
<input placeholder="Search news, places, dates...">
</div>

<div class="container">

<div class="box">
<h2>Latest News</h2>

<div id="newsContainer">
Loading news...
</div>

</div>

<div class="box">
<h2>Blogs</h2>

<p>How to Invest ₹1000 in Stock Market</p>
<p>Hidden Places in Gurgaon Locals Love</p>

</div>

</div>

<div class="footer">PulseGurgaon © 2026</div>

<script>

async function loadNews(){

const container=document.getElementById("newsContainer");

try{

const response=await fetch("https://pulsegurgaon-backend.onrender.com/news");

const data=await response.json();

container.innerHTML="";

data.slice(0,20).forEach(article=>{

const div=document.createElement("div");

div.className="article";

div.innerHTML=`
<h3>${article.title}</h3>
<p>${article.source}</p>
<a href="${article.link}" target="_blank">Read source</a>
`;

container.appendChild(div);

});

}

catch(err){

container.innerText="Backend waking up... retrying in 5 seconds";

setTimeout(loadNews,5000);

}

}

loadNews();

</script>

</body>
</html>
