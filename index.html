<!DOCTYPE html>
<html>
<head>

<title>PulseGurgaon</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

header{
background:#1e73be;
color:white;
padding:12px;
font-size:20px;
font-weight:bold;
}

.container{
width:95%;
max-width:1100px;
margin:auto;
padding:15px;
}

.section{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:6px;
}

.news{
border-bottom:1px solid #ddd;
padding:10px 0;
}

.news h3{
margin:0;
font-size:18px;
}

.news p{
color:#555;
}

footer{
background:black;
color:white;
text-align:center;
padding:10px;
}

</style>

</head>

<body>

<header>
PulseGurgaon
</header>

<div class="container">

<div class="section">
<h2>Gurgaon</h2>
<div id="gurgaon"></div>
</div>

<div class="section">
<h2>Finance</h2>
<div id="finance"></div>
</div>

<div class="section">
<h2>World</h2>
<div id="world"></div>
</div>

</div>

<footer>
PulseGurgaon © 2026
</footer>

<script>

async function loadNews(){

const res = await fetch("https://pulsegurgaon-backend.onrender.com/news")

const articles = await res.json()

const gurgaon = document.getElementById("gurgaon")

gurgaon.innerHTML=""

articles.forEach(a=>{

gurgaon.innerHTML += `
<div class="news">
<h3>${a.title}</h3>
<p>${a.summary}</p>
</div>
`

})

}

loadNews()

</script>

</body>
</html>
