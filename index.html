<!DOCTYPE html><html>
<head>
<title>PulseGurgaon</title><style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.header{
background:#1e63c6;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.nav{
background:#e6e6e6;
padding:10px;
}

.nav a{
margin-right:20px;
text-decoration:none;
color:black;
}

.search{
padding:20px;
text-align:center;
}

.search input{
width:70%;
padding:12px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

.layout{
display:grid;
grid-template-columns:150px 1fr 250px;
gap:20px;
padding:20px;
}

.ad{
background:white;
padding:10px;
border-radius:6px;
text-align:center;
}

.section{
background:white;
border-radius:8px;
padding:15px;
margin-bottom:20px;
}

.section h2{
margin-top:0;
}

.slider{
position:relative;
display:flex;
align-items:center;
}

.row{
display:flex;
gap:15px;
overflow:hidden;
padding:10px;
min-height:180px;
}

.card{
min-width:250px;
background:#fafafa;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
padding:10px;
}

.card img{
width:100%;
border-radius:6px;
margin-bottom:8px;
}

.card h4{
font-size:15px;
margin:5px 0;
}

.card button{
background:#1e63c6;
color:white;
border:none;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
}

.arrow{
background:#1e63c6;
color:white;
border:none;
font-size:18px;
padding:10px;
cursor:pointer;
border-radius:6px;
margin:0 5px;
}

.blogs{
background:white;
border-radius:8px;
padding:15px;
margin-top:20px;
}

.footer{
background:black;
color:white;
text-align:center;
padding:12px;
}

</style></head><body><div class="header">PulseGurgaon</div><div class="nav">
<a>Home</a>
<a>India</a>
<a>Gurgaon</a>
<a>World</a>
<a>Finance</a>
<a>Blogs</a>
</div><div class="search">
<input placeholder="Search news, places, dates...">
</div><div class="layout"><div class="ad">ADVERTISEMENT</div><div><div class="section"><h2>Gurgaon</h2><div class="slider">
<button class="arrow" onclick="slide('gurgaon',-300)">❮</button><div class="row" id="gurgaon"></div><button class="arrow" onclick="slide('gurgaon',300)">❯</button>

</div></div><div class="section"><h2>Finance</h2><div class="slider">
<button class="arrow" onclick="slide('finance',-300)">❮</button><div class="row" id="finance"></div><button class="arrow" onclick="slide('finance',300)">❯</button>

</div></div><div class="section"><h2>World</h2><div class="slider">
<button class="arrow" onclick="slide('world',-300)">❮</button><div class="row" id="world"></div><button class="arrow" onclick="slide('world',300)">❯</button>

</div></div></div><div><div class="ad">ADVERTISEMENT</div><div class="blogs">
<h3>Blogs</h3>
<p>How to Invest ₹1000</p>
<p>Hidden Places in Gurgaon</p>
<p>Startup Ideas in India</p>
</div></div></div><div class="footer">PulseGurgaon © 2026</div><script>

function slide(id,amount){
document.getElementById(id).scrollLeft+=amount
}

function createCard(article){

const div=document.createElement("div")
div.className="card"

div.innerHTML=`
<img src="https://image.pollinations.ai/prompt/news ${article.title}">
<h4>${article.title}</h4>
<button onclick="openArticle('${encodeURIComponent(article.title)}')">Read Article</button>
`

return div
}

function openArticle(title){
localStorage.setItem("articleTitle",title)
window.location="article.html"
}

async function loadNews(){

const res=await fetch("https://pulsegurgaon-backend.onrender.com/news")
const data=await res.json()

data.forEach(article=>{

let title=article.title.toLowerCase()
let card=createCard(article)

if(title.includes("gurgaon")||title.includes("gurugram"))
document.getElementById("gurgaon").appendChild(card)

else if(title.includes("bank")||title.includes("finance")||title.includes("market"))
document.getElementById("finance").appendChild(card)

else
document.getElementById("world").appendChild(card)

})

}

loadNews()

</script></body>
</html>
