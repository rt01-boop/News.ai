<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f2f2f2;
}

header{
background:#1e73be;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.section{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:6px;
}

.news-card{
border-bottom:1px solid #ddd;
padding:10px 0;
}

.news-card h3{
margin:0;
font-size:18px;
}

.news-card p{
color:#555;
}

.read{
color:#1e73be;
text-decoration:none;
font-weight:bold;
}

footer{
background:black;
color:white;
text-align:center;
padding:10px;
}

</style>
</head>

<body>

<header>
PulseGurgaon
</header>

<div class="container">

<div class="section">
<h2>Latest News</h2>

<div id="newsContainer">
Loading articles...
</div>

</div>

</div>

<footer>
PulseGurgaon © 2026
</footer>

<script>

async function loadNews(){

try{

const response = await fetch("https://pulsegurgaon-backend.onrender.com/news")

const articles = await response.json()

const container = document.getElementById("newsContainer")

container.innerHTML=""

articles.forEach(article => {

const card = document.createElement("div")

card.className="news-card"

card.innerHTML = `
<h3>${article.title}</h3>
<p>${article.summary}</p>
<a class="read" href="#">Read article</a>
`

container.appendChild(card)

})

}catch(error){

document.getElementById("newsContainer").innerHTML="Failed to load news."

}

}

loadNews()

</script>

</body>
</html>
