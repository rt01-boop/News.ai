<!DOCTYPE html><html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PulseGurgaon</title><style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0b57d0;
color:white;
padding:18px;
font-size:24px;
font-weight:bold;
}

nav{
background:white;
padding:12px;
border-bottom:1px solid #ddd;
}

nav a{
margin-right:20px;
text-decoration:none;
color:#333;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
padding:20px;
}

.news{
flex:2;
background:white;
padding:20px;
border-radius:6px;
margin-right:20px;
}

.sidebar{
flex:1;
background:white;
padding:20px;
border-radius:6px;
}

.article{
padding:10px 0;
border-bottom:1px solid #eee;
}

.article a{
color:#0b57d0;
text-decoration:none;
font-size:16px;
}

footer{
background:#111;
color:white;
padding:15px;
text-align:center;
margin-top:40px;
}

</style></head><body><header>
PulseGurgaon
</header><nav>
<a href="#">Gurgaon</a>
<a href="#">Finance</a>
<a href="#">World</a>
<a href="#">Blogs</a>
</nav><div class="container"><div class="news"><h2>Latest News</h2><div id="newsContainer">
Loading news...
</div></div><div class="sidebar"><h3>Blogs</h3><p>How to Invest ₹1000 in Stock Market</p>
<p>Hidden Places in Gurgaon Locals Love</p></div></div><footer>
PulseGurgaon © 2026
</footer><script>

async function loadNews(){

const container = document.getElementById("newsContainer")

try{

const response = await fetch("https://pulsegurgaon-backend.onrender.com/news")

const data = await response.json()

container.innerHTML=""

data.slice(0,20).forEach(article=>{

const div=document.createElement("div")

div.className="article"

div.innerHTML=`
<a href="${article.link}" target="_blank">
${article.title}
</a>
`

container.appendChild(div)

})

}catch(err){

container.innerText="Backend waking up... retrying in 5 seconds"

setTimeout(loadNews,5000)

}

}

loadNews()

setInterval(loadNews,120000)

</script></body>
</html>
