<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PulseGurgaon</title><style>

body{
font-family:Arial;
margin:0;
background:#f2f4f7;
}

header{
background:#0b57d0;
color:white;
padding:18px;
font-size:24px;
font-weight:bold;
}

nav{
background:white;
padding:12px;
border-bottom:1px solid #ddd;
}

nav a{
margin-right:20px;
text-decoration:none;
color:#333;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
padding:20px;
}

.timeline{
flex:2;
background:white;
padding:20px;
border-radius:6px;
margin-right:20px;
}

.article{
border-bottom:1px solid #eee;
padding:15px 0;
}

.article h3{
margin:0;
font-size:18px;
}

.article a{
color:#0b57d0;
text-decoration:none;
}

.sidebar{
flex:1;
background:white;
padding:20px;
border-radius:6px;
}

.notice{
background:#fff3cd;
padding:10px;
border-radius:6px;
margin-bottom:15px;
display:none;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}

</style></head><body><header>
PulseGurgaon
</header><nav>
<a href="#">Home</a>
<a href="#">India</a>
<a href="#">Gurgaon</a>
<a href="#">World</a>
<a href="#">Finance</a>
<a href="#">Blogs</a>
</nav><div class="container"><div class="timeline"><div id="newNotice" class="notice">
New article available. Refresh page.
</div><h2>Latest News</h2><div id="newsContainer"></div></div><div class="sidebar"><h3>Blogs</h3><p>How to Invest ₹1000 in Stock Market</p>
<p>Hidden Places in Gurgaon Locals Love</p></div></div><footer>
PulseGurgaon © 2026
</footer><script>

let currentArticles = [];

async function fetchNews(){

try{

const response = await fetch("https://pulsegurgaon-backend.onrender.com/news");

const data = await response.json();

if(currentArticles.length === 0){
renderNews(data);
currentArticles = data;
}

else if(data.length > currentArticles.length){
document.getElementById("newNotice").style.display="block";
}

localStorage.setItem("cachedNews",JSON.stringify(data));

}

catch(err){

const cached = localStorage.getItem("cachedNews");

if(cached){
renderNews(JSON.parse(cached));
}

}

}

function renderNews(news){

const container = document.getElementById("newsContainer");

container.innerHTML="";

news.reverse().forEach(article=>{

const div=document.createElement("div");

div.className="article";

div.innerHTML=`
<h3>${article.title}</h3>
<p>${article.source}</p>
<a href="${article.link}" target="_blank">Read full article</a>
`;

container.appendChild(div);

});

}

fetchNews();

setInterval(fetchNews,120000);

</script></body>
</html>
